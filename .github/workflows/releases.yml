name: Publish Release Artifacts

on:
  release:
    types: [published, created]
  workflow_dispatch:

jobs:
  publish-artifacts:
    name: Publish build artifacts to GitHub Releases
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📋 Load environment
        id: env
        run: |
          source src/.env.build
          echo "version=${YUMIOS_VERSION}" >> $GITHUB_OUTPUT
          echo "edition=${YUMIOS_EDITION}" >> $GITHUB_OUTPUT
          echo "date=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: 📝 Generate release notes
        id: notes
        run: |
          cat > release_notes.md << 'EOF'
          # YumiOS Klipper V2 — Cinnamoroll Edition

          **Version**: ${{ steps.env.outputs.version }}
          **Edition**: ${{ steps.env.outputs.edition }}
          **Date**: ${{ steps.env.outputs.date }}

          ## Build Information

          This release includes:
          - ✓ Fork-locked architecture (all components on `yumi-stable` branch)
          - ✓ Customized Klipper, Moonraker, KlipperScreen
          - ✓ Cinnamoroll branding (Plymouth theme)
          - ✓ Multi-architecture support (armv7, aarch64, x86_64)

          ## Fork URLs

          All components are pinned to controlled forks:
          - **Klipper**: https://github.com/Yumi-Lab/klipper (`yumi-stable`)
          - **Moonraker**: https://github.com/Yumi-Lab/moonraker (`yumi-stable`)
          - **KlipperScreen**: https://github.com/Yumi-Lab/KlipperScreen (`yumi-stable`)
          - **Crowsnest**: https://github.com/Yumi-Lab/crowsnest (`yumi-stable`)

          ## Installation

          Download the appropriate image for your device:
          - **Raspberry Pi 3/4 (armv7)**: yumios-klipper-v2-armv7.zip
          - **Raspberry Pi 4B+ (aarch64)**: yumios-klipper-v2-aarch64.zip

          Flash using Balena Etcher, Rpi Imager, or `dd`:
          ```bash
          # Extract
          unzip yumios-klipper-v2-*.zip

          # Flash to SD card (replace sdX with your device)
          sudo dd if=yumios-klipper-v2-*.img of=/dev/sdX bs=4M conv=fsync
          ```

          ## Verification

          After first boot:
          1. SSH into device: `ssh pi@yumios.local` (password: `raspberry`)
          2. Verify fork URLs: `cd /opt/klipper && git remote -v`
          3. Check services: `systemctl status klipper moonraker`

          ## Support

          - Documentation: https://github.com/Yumi-Lab/YumiOS-Klipper-V2
          - Issue tracker: https://github.com/Yumi-Lab/YumiOS-Klipper-V2/issues

          EOF
          echo "✓ Release notes generated"

      - name: 📦 Create draft artifacts
        id: artifacts
        run: |
          echo "Preparing build artifacts..."

          # Create checksums file
          cat > ARTIFACTS.sha256 << 'EOF'
          # YumiOS Klipper V2 Build Artifacts
          # Generated: ${{ steps.env.outputs.date }}
          # Version: ${{ steps.env.outputs.version }}
          #
          # Verify with: sha256sum -c ARTIFACTS.sha256

          # When actual images are built and uploaded, add their checksums here
          # Format: <sha256hash>  <filename>
          EOF

          echo "✓ Artifact manifest created"

      - name: 📢 Display release information
        run: |
          echo "## Release Ready to Publish"
          echo ""
          echo "**Version**: ${{ steps.env.outputs.version }}"
          echo "**Edition**: ${{ steps.env.outputs.edition }}"
          echo "**Date**: ${{ steps.env.outputs.date }}"
          echo ""
          echo "### Ready for upload:"
          echo "- [ ] YumiOS images (when built via CustomPiOS)"
          echo "- [ ] Release notes and documentation"
          echo "- [ ] Checksums for verification"
          echo ""
          echo "### Next Steps:"
          echo "1. Build actual images using CustomPiOS Docker container"
          echo "2. Upload .zip files to GitHub Releases"
          echo "3. Verify checksums"
          echo "4. Publish release"

