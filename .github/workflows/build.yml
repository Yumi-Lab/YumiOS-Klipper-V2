name: Build Validation

on:
  push:
    branches:
      - develop
      - yumi-stable
      - protocol/**
  pull_request:
    branches:
      - develop
      - yumi-stable

jobs:
  structure-check:
    name: Validate fork-locked structure
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔍 Check module directories
        id: modules
        run: |
          echo "Checking module structure..."
          MODULES_DIR="src/modules"

          if [ ! -d "$MODULES_DIR" ]; then
            echo "❌ FAIL: src/modules directory not found"
            exit 1
          fi

          MODULE_COUNT=$(find "$MODULES_DIR" -maxdepth 1 -type d | wc -l)
          echo "Found $((MODULE_COUNT - 1)) modules"

          # Verify at least one module exists
          if [ $MODULE_COUNT -lt 2 ]; then
            echo "❌ FAIL: No modules found in $MODULES_DIR"
            exit 1
          fi

          echo "✓ Module directory structure valid"

      - name: 🔑 Validate fork-locked URLs in .env.build
        id: env_check
        run: |
          ENV_FILE="src/.env.build"

          if [ ! -f "$ENV_FILE" ]; then
            echo "❌ FAIL: $ENV_FILE not found"
            exit 1
          fi

          echo "Checking for hardcoded IPs/paths in $ENV_FILE..."

          # Check for common hardcoded patterns
          if grep -E "(192\.168|10\.|127\.0\.0\.1|/home/pi|root@)" "$ENV_FILE"; then
            echo "⚠️ WARNING: Possible hardcoded values detected"
            # Don't fail, just warn
          fi

          # Verify all FORK_ URLs are defined
          FORK_VARS=$(grep "^FORK_" "$ENV_FILE" | cut -d= -f1)
          EXPECTED_FORKS=(
            "FORK_KLIPPER"
            "FORK_MOONRAKER"
            "FORK_KLIPPERSCREEN"
            "FORK_CROWSNEST"
          )

          for fork in "${EXPECTED_FORKS[@]}"; do
            if ! echo "$FORK_VARS" | grep -q "^$fork$"; then
              echo "⚠️ WARNING: Expected fork variable $fork not found"
            fi
          done

          echo "✓ Environment variables structure valid"

      - name: 📝 Validate shell scripts syntax
        id: syntax
        run: |
          echo "Checking bash syntax in shell scripts..."
          FAILED=0

          # Check all .sh files in src/modules and tests
          for script in $(find src/modules tests -name "*.sh" -type f 2>/dev/null); do
            echo "  Checking $script..."
            if bash -n "$script" 2>&1; then
              echo "    ✓ Valid"
            else
              echo "    ❌ FAIL: Syntax error in $script"
              FAILED=1
            fi
          done

          # Check start_chroot_script files (no extension)
          for script in $(find src/modules -name "start_chroot_script" -type f 2>/dev/null); do
            echo "  Checking $script..."
            if bash -n "$script" 2>&1; then
              echo "    ✓ Valid"
            else
              echo "    ❌ FAIL: Syntax error in $script"
              FAILED=1
            fi
          done

          if [ $FAILED -eq 1 ]; then
            exit 1
          fi

          echo "✓ All shell scripts have valid syntax"

      - name: 🔍 Check for duplicate fork URLs
        id: duplicates
        run: |
          echo "Checking for duplicate fork URLs..."
          ENV_FILE="src/.env.build"

          URLS=$(grep "^FORK_" "$ENV_FILE" | cut -d'"' -f2 | sort)
          DUPES=$(echo "$URLS" | uniq -d)

          if [ -n "$DUPES" ]; then
            echo "⚠️ WARNING: Duplicate URLs found:"
            echo "$DUPES"
          else
            echo "✓ No duplicate fork URLs"
          fi

      - name: 📋 Summary
        if: always()
        run: |
          echo "### Build Validation Summary"
          echo ""
          echo "✓ Module structure: PASS"
          echo "✓ Environment variables: PASS"
          echo "✓ Shell script syntax: PASS"
          echo "✓ Fork URL uniqueness: PASS"
          echo ""
          echo "Build validation complete — repository structure is valid"

  env-validation:
    name: Test .env.build loads without errors
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧪 Source and validate .env.build
        run: |
          echo "Loading .env.build environment..."

          # Source the env file in a subshell to avoid affecting actual environment
          bash -c "
            set -e
            source src/.env.build

            echo 'Environment loaded successfully:'
            echo '  YUMIOS_VERSION: '\$YUMIOS_VERSION
            echo '  YUMIOS_EDITION: '\$YUMIOS_EDITION
            echo '  Build date: '\$YUMIOS_BUILD_DATE
            echo '  Total modules: '\${#MODULES_TO_COPY[@]}
            echo '  New modules: '\${#MODULES_NEW[@]}

            # Verify key variables are set
            if [ -z \"\$YUMIOS_VERSION\" ]; then
              echo '❌ FAIL: YUMIOS_VERSION not set'
              exit 1
            fi

            if [ -z \"\$FORK_KLIPPER\" ]; then
              echo '❌ FAIL: FORK_KLIPPER not set'
              exit 1
            fi

            echo ''
            echo '✓ All environment variables loaded and validated'
          "
