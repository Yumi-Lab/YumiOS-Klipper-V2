name: Build Image
on:
  push:
    branches:
      - "develop"
      - "master"
    paths:
      - "src/modules/**"
      - "src/build_dist"
      - "config/**"
      - ".github/workflows/BuildImages.yml"
      - ".github/workflow_config.yml"
      - ".github/scripts/setup_matrix.py"
    tags-ignore:
      - "**"
  pull_request:
    types: [opened, edited, reopened, synchronize]
    paths:
      - "src/**"
      - "config/**"
      - ".github/workflows/BuildImages.yml"
      - ".github/scripts/setup_matrix.py"
      - ".github/workflow_config.yml"

  workflow_dispatch:

# Allow to stop obsolete workflows
concurrency:
  group: ci-build-${{ github.ref }}-1
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-22.04-arm
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Matrix
        id: set-matrix
        run: |
          PY_INT=$(command -v python3)
          CONFIG="${{ github.workspace }}/.github/workflow_config.yml"
          GROUP="buildtest"
          $PY_INT ${{ github.workspace }}/.github/scripts/setup_matrix.py -c $CONFIG -g $GROUP --git

  build:
    needs: setup
    runs-on: ubuntu-22.04-arm
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          path: repository
          submodules: true

      - name: Build image
        id: build
        uses: ./repository/.github/actions/build
        with:
          config: ${{ matrix.config }}
          custompios-ref: 1.5.0

      - name: Rename image file
        id: move-image
        if: always()
        shell: bash
        run: |
          source repository/src/config
          NOW="$(date +"%Y-%m-%d-%H%M")"
          IMAGE="${DIST_NAME}-${DIST_VERSION}-${{ steps.build.outputs.sbc }}-${BASE_OS_CODENAME}-${BASE_OS_VERSION}-${NOW}"

          sudo mv repository/src/workspace/*.img $IMAGE.img

          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Upload failed Logfile
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-${{ steps.move-image.outputs.image }}.log
          path: repository/src/build.log

      - name: Compressing Image
        shell: bash
        run: |
          CPU_COUNT="$(nproc)"
          echo -e "\e[32mUsing ${CPU_COUNT} Cores for compression...\e[0m"
          xz -efkvz9T"${CPU_COUNT}" ${{ steps.move-image.outputs.image }}.img

      - name: Calculating checksums
        shell: bash
        run: |
          sha256sum ${{ steps.move-image.outputs.image }}.img > ${{ steps.move-image.outputs.image }}.img.sha256
          sha256sum ${{ steps.move-image.outputs.image }}.img.xz > ${{ steps.move-image.outputs.image }}.img.xz.sha256

      - name: Upload Compressed Image
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.move-image.outputs.image }}.img.xz
          path: ${{ steps.move-image.outputs.image }}.img.xz

      - name: Upload Compressed Image Checksum
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.move-image.outputs.image }}.img.xz.sha256
          path: ${{ steps.move-image.outputs.image }}.img.xz.sha256

      - name: Upload Image Checksum
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.move-image.outputs.image }}.img.sha256
          path: ${{ steps.move-image.outputs.image }}.img.sha256

      - name: Deploy to YUMI SERVER
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          DE_SSH_KEY: ${{ secrets.DE_SSH_KEY }}
        shell: bash
        run: |
          echo "$DE_SSH_KEY" > /tmp/de_key && chmod 600 /tmp/de_key
          mkdir -p ~/.ssh
          ssh-keyscan 82.165.249.233 >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i /tmp/de_key root@82.165.249.233 "rm -f /var/www/download.yumi-lab.com/YumiOS-Klipper-V2/*.img.xz"
          scp -i /tmp/de_key ${{ steps.move-image.outputs.image }}.img.xz root@82.165.249.233:/var/www/download.yumi-lab.com/YumiOS-Klipper-V2/
          rm /tmp/de_key
          echo "Deployed: /var/www/download.yumi-lab.com/YumiOS-Klipper-V2/${{ steps.move-image.outputs.image }}.img.xz"
