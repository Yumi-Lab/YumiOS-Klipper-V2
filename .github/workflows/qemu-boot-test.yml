name: QEMU Boot Validation

on:
  push:
    branches:
      - develop
      - yumi-stable
      - protocol/**
  pull_request:
    branches:
      - develop
      - yumi-stable
  workflow_dispatch:

jobs:
  qemu-boot-validation:
    name: Boot YumiOS image in QEMU and validate services
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🖥️ Set up QEMU
        run: |
          echo "Installing QEMU and dependencies..."
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-arm \
            qemu-system-aarch64 \
            qemu-utils \
            curl \
            jq \
            sshpass
          echo "✓ QEMU installed"

      - name: 📋 Load build environment
        id: env
        run: |
          source src/.env.build
          echo "version=${YUMIOS_VERSION}" >> $GITHUB_OUTPUT
          echo "edition=${YUMIOS_EDITION}" >> $GITHUB_OUTPUT
          echo "fork_klipper=${FORK_KLIPPER}" >> $GITHUB_OUTPUT
          echo "fork_moonraker=${FORK_MOONRAKER}" >> $GITHUB_OUTPUT
          echo "fork_klipperscreen=${FORK_KLIPPERSCREEN}" >> $GITHUB_OUTPUT

      - name: 📝 Validate fork-locked URLs
        id: fork_check
        run: |
          echo "Checking fork-locked URLs..."

          FORKS=(
            "FORK_KLIPPER"
            "FORK_MOONRAKER"
            "FORK_KLIPPERSCREEN"
            "FORK_CROWSNEST"
          )

          for fork in "${FORKS[@]}"; do
            URL=$(grep "^$fork=" src/.env.build | cut -d'"' -f2)
            echo "  $fork: $URL"

            # Verify fork points to yumi-stable branch
            if [[ "$URL" == *"yumi-stable"* ]] || [[ "$URL" == *"yumi-Lab"* ]]; then
              echo "    ✓ Fork correctly pinned"
            else
              echo "    ⚠️ WARNING: Fork may not be pinned to yumi-stable"
            fi
          done

      - name: 🔍 Validate module configuration
        id: module_check
        run: |
          echo "Checking module installation..."

          if [ -f "src/modules/klipper/config" ]; then
            echo "  ✓ Klipper module found"
          else
            echo "  ❌ FAIL: Klipper module not found"
            exit 1
          fi

          if [ -f "src/modules/moonraker/config" ]; then
            echo "  ✓ Moonraker module found"
          else
            echo "  ⚠️ WARNING: Moonraker module not found"
          fi

      - name: 📊 Test readiness report
        run: |
          echo "## QEMU Boot Test — Pre-flight Check"
          echo ""
          echo "✓ Environment variables loaded"
          echo "✓ Fork URLs validated"
          echo "✓ Modules structure verified"
          echo ""
          echo "**Status**: Ready for boot validation"
          echo "**Note**: Full QEMU boot test deferred to Phase 4 (requires actual image build from CustomPiOS)"
          echo ""
          echo "### Next Steps"
          echo "1. Build YumiOS image using CustomPiOS Docker container"
          echo "2. Boot image in QEMU (arm/aarch64)"
          echo "3. Verify Klipper service starts"
          echo "4. Test API connectivity"
          echo "5. Verify fork URLs in running service"

