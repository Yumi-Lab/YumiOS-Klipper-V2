name: Build YumiOS armv7

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build armv7 Image
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📋 Load environment
        id: env
        run: |
          source src/.env.build
          echo "version=${YUMIOS_VERSION}" >> $GITHUB_OUTPUT
          echo "edition=${YUMIOS_EDITION}" >> $GITHUB_OUTPUT
          echo "date=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: 🖥️ Set up system
        run: |
          echo "Installing build dependencies..."
          sudo apt-get update
          sudo apt-get install -y \
            git \
            wget \
            curl \
            jq \
            zip \
            bzip2 \
            xz-utils \
            kpartx \
            parted \
            qemu-user-static

      - name: 🐳 Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📥 Pull CustomPiOS Docker image
        run: |
          echo "Pulling CustomPiOS Docker image..."
          docker pull ghcr.io/yumi-lab/custompios:latest || {
            echo "CustomPiOS image not found in GHCR"
            exit 1
          }

      - name: 🏗️ Build YumiOS armv7
        id: build
        run: |
          echo "🏗️ Building YumiOS armv7..."
          mkdir -p /tmp/yumios-builds

          BOARD="raspberrypiarmhf"
          VERSION="${{ steps.env.outputs.version }}"
          EDITION="${{ steps.env.outputs.edition }}"
          FILENAME="yumios-klipper-v2-armv7"

          echo "📝 Build configuration:"
          echo "  Board: $BOARD"
          echo "  Version: $VERSION"
          echo "  Edition: $EDITION"

          BUILD_CMD="docker run --rm \
            -v $(pwd):/build \
            -v /tmp/yumios-builds:/YumiOS/dist \
            -e YUMIOS_VERSION=$VERSION \
            -e YUMIOS_EDITION=\"$EDITION\" \
            -e PI_VERSION=$BOARD \
            ghcr.io/yumi-lab/custompios:latest /build/src/build.sh"

          echo "🐳 Running Docker build..."
          eval "$BUILD_CMD"

          if [ -f "/tmp/yumios-builds/${FILENAME}.img" ]; then
            echo "✓ Image created: ${FILENAME}.img"
          else
            echo "❌ Build failed"
            exit 1
          fi

      - name: 📦 Create ZIP archive
        run: |
          cd /tmp/yumios-builds
          zip -j yumios-armv7/yumios-klipper-v2-armv7.zip yumios-klipper-v2-armv7.img
          ls -lh yumios-armv7/

      - name: 🔐 Generate checksums
        run: |
          cd /tmp/yumios-builds
          sha256sum yumios-armv7/yumios-klipper-v2-armv7.zip > checksums/ARTIFACTS.sha256
          cat checksums/ARTIFACTS.sha256

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yumios-armv7
          path: /tmp/yumios-builds/yumios-armv7/yumios-klipper-v2-armv7.zip
          retention-days: 30

      - name: 📤 Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: /tmp/yumios-builds/checksums/ARTIFACTS.sha256
          retention-days: 30

      - name: ✅ Build summary
        run: |
          echo "=========================================="
          echo "✅ YumiOS armv7 Build Complete"
          echo "=========================================="
          echo "Version: ${{ steps.env.outputs.version }}"
          echo "Edition: ${{ steps.env.outputs.edition }}"
          echo "Date: ${{ steps.env.outputs.date }}"
          echo ""
          echo "Artifacts ready for download!"
